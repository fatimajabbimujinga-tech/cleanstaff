<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration — Clean Staff</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23C9A84C'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' font-family='serif' font-weight='700' font-size='14' fill='%230A0C14'>CS</text></svg>">
  <link rel="stylesheet" href="css/design.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; background: var(--creme); }
    .login-card {
      background: var(--blanc);
      border: 1px solid var(--bord-2);
      border-radius: var(--r4);
      padding: 48px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--s3);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo-mark {
      width: 52px; height: 52px;
      background: var(--marron);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-weight: 700;
      color: var(--beige);
      font-size: 1.1rem;
    }
    .demo-box {
      background: rgba(201,168,76,0.06);
      border: 1px solid var(--bord);
      border-radius: var(--r2);
      padding: 14px 16px;
      font-size: 0.8rem;
      font-family: var(--font-mono);
      color: var(--t3);
      margin-bottom: 24px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">CS</div>
      <div style="font-family:var(--font-display);font-size:1.2rem;font-weight:500">Administration</div>
      <div style="font-size:0.8rem;color:var(--t3);margin-top:4px">Accès réservé au personnel Clean Staff</div>
    </div>

        <input type="email" class="form-input" id="email" placeholder="admin@cleanstaff.fr">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
      </div>
      <div id="error-msg" style="display:none;color:#C0392B;font-size:0.83rem;background:rgba(248,113,113,0.1);padding:10px 14px;border-radius:var(--r2);border:1px solid rgba(248,113,113,0.2)"></div>
      <button class="btn btn-primary btn-lg" onclick="login()" style="justify-content:center;margin-top:8px">
        Se connecter
      </button>
    </div>

    <div style="text-align:center;margin-top:24px">
      <a href="hotel-login.html" style="font-size:0.82rem;color:var(--t3)">← Accès hôtels</a>
    </div>
  </div>

<script src="js/core.js"></script>
<script>
  if (STORE.isAdmin()) window.location.href = 'admin.html';

  function login() {
    const email = document.getElementById('email').value.trim();
    const pwd   = document.getElementById('password').value;
    const res   = AUTH.loginAdmin(email, pwd);
    if (res.ok) {
      window.location.href = 'admin.html';
    } else {
      const err = document.getElementById('error-msg');
      err.textContent = res.error;
      err.style.display = 'block';
    }
  }
</script>
</body>
</html>
